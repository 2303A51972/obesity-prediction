<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ObesityPredict AI - Create Account</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
  <main class="auth-shell">
    <section class="auth-card">
      <div class="auth-brand">
        <span class="brand-mark">∿</span>
        <div>
          <h1>ObesityPredict AI</h1>
          <p>Create your account</p>
        </div>
      </div>

      <button class="google-button" type="button" onclick="signInWithGoogle()">Continue with Google</button>

      <div class="auth-divider"><span>or</span></div>

      <div class="auth-form">
        <label>
          <span>Email</span>
          <input id="email" type="email" placeholder="you@example.com" autocomplete="email">
        </label>

        <label>
          <span>Password</span>
          <input id="password" type="password" placeholder="Create a password" autocomplete="new-password">
        </label>

        <button class="primary-auth-button" type="button" onclick="register()">Create Account</button>
      </div>

      <p class="auth-footer">
        Already have an account? <a href="login.html">Sign in</a>
      </p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
